# === Calibration ===
calibration:
  frame_count: 200
  tolerance: 0.05
  min_breeds: 5
  distribution:
    lighting:
      bright: 0.40
      dim: 0.20
      infrared_night: 0.20
      unknown: 0.20
    action_primary:
      eating: 0.50
      sniffing_only: 0.20
      leaving_bowl: 0.15
      other: 0.15
  exclude:
    train_ids_path: ""
    gold_set_path: ""
  data_db_path: ""
  output_dir: "artifacts/calibration"

# === Conversion ===
convert:
  vision:
    input_size: [448, 448]
    onnx_opset: 17
    rknn_target: "rk3576"
    rknn_dtype: "fp16"
  llm:
    rkllm_target: "rk3576"
    quantization: "w8a8"
  audio:
    rknn_target: "rk3576"
    rknn_dtype: "int8"
  weights_dir: ""
  audio_checkpoint: ""
  output_dir: "artifacts/converted"

# === Inference ===
inference:
  schema_version: "1.0"
  simulated_sample_size: 50
  device:
    adb_timeout: 30
    warmup_runs: 3
    latency_runs: 20
  fp16_weights_dir: ""

# === Quality Gates (shared with pet-eval) ===
gates:
  vlm:
    schema_compliance: 0.99
    distribution_sum_error: 0.01
    latency_p95_ms: 4000
    kl_divergence: 0.02
  audio:
    overall_accuracy: 0.80
    vomit_recall: 0.70

# === Validation (smoke) ===
validate:
  smoke_sample_size: 30
  kl_threshold: 0.05

# === Packaging ===
packaging:
  version: ""
  lora_version: ""
  min_firmware: "2.0.0"
  release_notes: ""

# === Audio ===
audio:
  sample_rate: 16000
  n_mels: 64
  classes: ["eating", "drinking", "vomiting", "ambient", "other"]

# === wandb ===
wandb:
  project: "pet-quantize"
  entity: ""
